name: senior_care_app
description: A Flutter app for senior care

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  flutter:
    sdk: flutter

  google_sign_in: ^6.1.5
  cupertino_icons: ^1.0.2
  intl: ^0.18.1
  url_launcher: ^6.2.0
  network_info_plus: ^5.0.0

  http: ^1.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.2.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true